# ==========================================================
#  Extreme Wordle – Full-Stack Docker Compose
# ==========================================================
#  Usage:
#    docker compose up --build        # start everything
#    docker compose down -v           # stop & remove volumes
#
#  Services:
#    db       – PostgreSQL 16
#    redis    – Redis 7
#    backend  – Node.js API server (port 3001)
# ==========================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wordle_admin
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: extreme_wordle
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordle_admin -d extreme_wordle"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: wordle_admin
      PG_PASSWORD: changeme
      PG_DATABASE: extreme_wordle
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
